name: Sync Skills to Skills Repository

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  sync-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout skills repository
        uses: actions/checkout@v4
        with:
          repository: shinyorg/skills
          token: ${{ secrets.SKILLS_REPO_TOKEN }}
          path: skills-repo

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync skills directory
        run: |
          if [ -d "source/skills/shiny-permissions-msbuild" ]; then
            rm -rf skills-repo/skills/shiny-permissions-msbuild
            mkdir -p skills-repo/skills
            cp -r source/skills/shiny-permissions-msbuild skills-repo/skills/
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SKILLS_REPO_TOKEN }}
          path: skills-repo
          commit-message: "Update shiny-permissions-msbuild skill from Shiny.Permissions.MSBuild repository"
          title: "Update shiny-permissions-msbuild skill"
          body: |
            This PR updates the shiny-permissions-msbuild skill from the [Shiny.Permissions.MSBuild repository](https://github.com/shinyorg/Shiny.Permissions.MSBuild).

            **Source commit:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}
            ---
            *This PR was automatically created by the [sync-skills workflow](https://github.com/shinyorg/Shiny.Permissions.MSBuild/actions/workflows/sync-skills.yml).*
          branch: update-shiny-permissions-msbuild-skill
          delete-branch: true
          labels: |
            automated
            skills-update
